
    <!DOCTYPE html>
    <html lang="en">
      <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <style>
          /* Base reset */
          * { box-sizing: border-box; }
          /* User CSS */
          
        </style>
        <script>
            // Capture console.log to display in parent (Optional future enhancement, currently just preventing errors)
            window.onerror = function(message, source, lineno, colno, error) {

      <body>
        <!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administract Coder - Game Jam Edition</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
            margin: 0;
        }
        h1 { color: #00ffcc; margin-bottom: 5px; }
        p { color: #888; margin-top: 0; }
        .container { display: flex; flex-direction: column; gap: 15px; }
        textarea {
            width: 100%;
            height: 280px;
            background-color: #1e1e1e;
            color: #a9ffb4;
            border: 2px solid #00ffcc;
            padding: 15px;
            font-size: 16px;
            border-radius: 6px;
            box-sizing: border-box;
            resize: vertical;
        }
        .botoes-container {
            display: flex;
            gap: 10px;
        }
        button {
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
            transition: all 0.2s;
        }
        button.btn-rodar { background-color: #00ffcc; color: #121212; }
        button.btn-rodar:hover { background-color: #00cc99; transform: scale(1.02); }
        button.btn-salvar { background-color: #e67e22; color: #ffffff; }
        button.btn-salvar:hover { background-color: #d35400; transform: scale(1.02); }
        
        #painel-resultado {
            background-color: #0d0d0d;
            border: 2px dashed #333;
            padding: 30px;
            border-radius: 8px;
            min-height: 320px;
            position: relative; /* Base para o posicionamento absoluto do jogo */
            margin-top: 20px;
            overflow: hidden;
        }
        /* Estilo base para os blocos do Administract */
        #painel-resultado button {
            font-family: Arial, sans-serif;
            text-align: center;
            border: none;
            display: block;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>

    <h1>Administract Coder 🚀</h1>
    <p>Engine Versão 4.8 - Comandos Avançados: "obstaculo" e "colising" nativos</p>
    
    <div class="container">
        <textarea id="codigo" placeholder="Digite seu código Administract aqui..."></textarea>
        
        <div class="botoes-container">
            <button class="btn-rodar" onclick="executarAdministract()">Executar Código</button>
            <button class="btn-salvar" onclick="compilarParaHtml()">Compilar para App (.administract.html)</button>
        </div>
    </div>

    <h2>Visualização Local (IDE)</h2>
    <div id="painel-resultado"></div>

    <script>
        let elementosCriados = {};
        let loopJogoAtivo = null;
        let colisoesAgendadas = {}; // Guarda quem monitora quem e qual ação disparar

        // --- SISTEMA DE MOVIMENTAÇÃO, OBSTÁCULOS E INTERSEÇÃO ---
        function inicializarFisicaPlayer(idPlayer, painelAlvo) {
            const player = elementosCriados[idPlayer];
            if (!player) return;

            painelAlvo.style.position = "relative"; 

            let posX = player.offsetLeft || 20;
            let posY = player.offsetTop || 60;

            player.style.position = "absolute";
            player.style.zIndex = "100";
            player.style.left = posX + "px";
            player.style.top = posY + "px";

            const teclas = { w: false, a: false, s: false, d: false };

            window.addEventListener("keydown", (e) => {
                const tecla = e.key.toLowerCase();
                if (tecla in teclas) {
                    teclas[tecla] = true;
                    e.preventDefault(); 
                }
            });

            window.addEventListener("keyup", (e) => {
                const tecla = e.key.toLowerCase();
                if (tecla in teclas) teclas[tecla] = false;
            });

            // Caixa de colisão física (Impede passar por obstáculos)
            function checarObstaculo(novoX, novoY) {
                const r1 = {
                    left: novoX, top: novoY,
                    right: novoX + player.offsetWidth, bottom: novoY + player.offsetHeight
                };
                const blocos = painelAlvo.querySelectorAll("button");
                let bateu = false;

                blocos.forEach(obs => {
                    if (obs.id === idPlayer || obs.style.display === "none") return;
                    // SÓ BLOQUEIA se for explicitamente um obstáculo
                    if (obs.getAttribute("data-game-type") !== "obstaculo") return;

                    const r2 = {
                        left: obs.offsetLeft, top: obs.offsetTop,
                        right: obs.offsetLeft + obs.offsetWidth, bottom: obs.offsetTop + obs.offsetHeight
                    };
                    if (r1.left < r2.right && r1.right > r2.left && r1.top < r2.bottom && r1.bottom > r2.top) {
                        bateu = true;
                    }
                });
                return bateu;
            }

            // Detector do comando "colising" (Gera gatilhos de ação por contato)
            function processarGatilhosColisao() {
                const r1 = {
                    left: posX, top: posY,
                    right: posX + player.offsetWidth, bottom: posY + player.offsetHeight
                };

                Object.keys(colisoesAgendadas).forEach(idAlvo => {
                    const obs = elementosCriados[idAlvo];
                    if (!obs || obs.style.display === "none") return;

                    const config = colisoesAgendadas[idAlvo];
                    if (config.playerTarget !== idPlayer) return;

                    const r2 = {
                        left: obs.offsetLeft, top: obs.offsetTop,
                        right: obs.offsetLeft + obs.offsetWidth, bottom: obs.offsetTop + obs.offsetHeight
                    };

                    // Se encostar no bloco do gatilho
                    if (r1.left < r2.right && r1.right > r2.left && r1.top < r2.bottom && r1.bottom > r2.top) {
                        if (config.tipoAcao === "alert") {
                            clearInterval(loopJogoAtivo); // Para o jogo
                            alert(config.valorAcao);
                            // Reseta as teclas para o boneco não travar andando no reboot
                            Object.keys(teclas).forEach(k => teclas[k] = false);
                            executarAdministract(); 
                        }
                    }
                });
            }

            if (loopJogoAtivo) clearInterval(loopJogoAtivo);
            
            loopJogoAtivo = setInterval(() => {
                let vel = 5; 
                let proximoX = posX;
                let proximoY = posY;

                if (teclas.w) proximoY -= vel;
                if (teclas.s) proximoY += vel;
                if (teclas.a) proximoX -= vel;
                if (teclas.d) proximoX += vel;

                if (!checarObstaculo(proximoX, posY)) posX = proximoX;
                if (!checarObstaculo(posX, proximoY)) posY = proximoY;

                player.style.left = posX + "px";
                player.style.top = posY + "px";

                processarGatilhosColisao();
            }, 1000 / 60);
        }

        // --- INTERPRETADOR CENTRAL ---
        function rodarInterpretador(linhas, painelAlvo) {
            linhas.forEach(linha => {
                if (linha === "" || !linha.startsWith("administract>c>")) return;

                const comandoPuro = linha.replace("administract>c>", "").trim();

                // 1. Criar Objeto/Mensagem
                if (comandoPuro.startsWith("message id")) {
                    const aspas = comandoPuro.match(/"([^"]+)"/g);
                    if (aspas && aspas.length >= 2) {
                        const id = aspas[0].replace(/"/g, "");
                        const texto = aspas[1].replace(/"/g, "");
                        const novoBotao = document.createElement('button');
                        novoBotao.id = id;
                        novoBotao.innerText = texto;
                        painelAlvo.appendChild(novoBotao);
                        elementosCriados[id] = novoBotao;
                    }
                }
                // 2. Estilizar Objeto
                else if (comandoPuro.startsWith("istility")) {
                    const idAlvoMatch = comandoPuro.match(/id message "([^"]+)"/);
                    if (idAlvoMatch) {
                        const idAlvo = idAlvoMatch[1];
                        const elemento = elementosCriados[idAlvo];
                        if (elemento) {
                            const confCores = comandoPuro.match(/"([^"]+)"/);
                            if (confCores) {
                                const propriedades = confCores[1].split(';');
                                propriedades.forEach(prop => {
                                    const partes = prop.split(':');
                                    if (partes.length === 2) {
                                        const chave = partes[0].trim().toLowerCase();
                                        const valor = partes[1].trim();
                                        if (chave === 'cor') elemento.style.backgroundColor = valor;
                                        if (chave === 'texto') elemento.style.color = valor;
                                    }
                                });
                            }
                            const alturaMatch = comandoPuro.match(/altura=(\d+)/);
                            const larguraMatch = comandoPuro.match(/largura=(\d+)/);
                            if (alturaMatch) {
                                  elemento.style.paddingTop = alturaMatch[1] + "px";
                                  elemento.style.paddingBottom = alturaMatch[1] + "px";
                            }
                            if (larguraMatch) {
                                  elemento.style.paddingLeft = larguraMatch[1] + "px";
                                  elemento.style.paddingRight = larguraMatch[1] + "px";
                            }
                        }
                    }
                }
                // 3. NOVO: Comando obstaculo
                else if (comandoPuro.startsWith("obstaculo id message")) {
                    const idAlvoMatch = comandoPuro.match(/"([^"]+)"/);
                    if (idAlvoMatch) {
                        const idAlvo = idAlvoMatch[1];
                        const elemento = elementosCriados[idAlvo];
                        if (elemento) {
                            elemento.setAttribute("data-game-type", "obstaculo");
                            elemento.style.cursor = "default";
                            elemento.style.outline = "none";
                        }
                    }
                }
                // 4. NOVO: Comando colising (Vincula colisão entre dois IDs)
                else if (comandoPuro.startsWith("colising id")) {
                    const aspas = comandoPuro.match(/"([^"]+)"/g);
                    if (aspas && aspas.length >= 2) {
                        const idBloco = aspas[0].replace(/"/g, "");
                        const idPlayer = aspas[1].replace(/"/g, "");
                        
                        if (!colisoesAgendadas[idBloco]) colisoesAgendadas[idBloco] = {};
                        colisoesAgendadas[idBloco].playerTarget = idPlayer;
                    }
                }
                // 5. Configurar Ações (Clicks ou Gatilhos de colising)
                else if (comandoPuro.startsWith("asion id")) {
                    const idAlvoMatch = comandoPuro.match(/id\s*"([^"]+)"/);
                    if (idAlvoMatch) {
                        const idAlvo = idAlvoMatch[1];
                        const elemento = elementosCriados[idAlvo];
                        
                        if (elemento) {
                            if (comandoPuro.includes("start player")) {
                                setTimeout(() => { inicializarFisicaPlayer(idAlvo, painelAlvo); }, 50);
                            }
                            // Carrega a ação automática se o asion for do tipo colising
                            else if (comandoPuro.includes("colising alert")) {
                                const msgMatch = comandoPuro.match(/alert\s+"([^"]+)"/);
                                if (msgMatch && colisoesAgendadas[idAlvo]) {
                                    colisoesAgendadas[idAlvo].tipoAcao = "alert";
                                    colisoesAgendadas[idAlvo].valorAcao = msgMatch[1];
                                }
                            }
                            // Suporte Legado a Cliques de mouse
                            else if (comandoPuro.includes("click")) {
                                if (comandoPuro.includes("alert")) {
                                    const msgMatch = comandoPuro.match(/alert\s+"([^"]+)"/);
                                    if (msgMatch) {
                                        elemento.onclick = function() { alert(msgMatch[1]); };
                                    }
                                }
                            }
                        }
                    }
                }
            });
        }

        // --- COMPILADOR PARA EXECUTÁVEL FINAL ---
        function compilarParaHtml() {
            const codigoTexto = document.getElementById('codigo').value;
            if (codigoTexto.trim() === "") {
                alert("Aviso: Digite algum código antes de compilar!");
                return;
            }
            const linhasTratadas = codigoTexto.split('\n').map(l => l.replace(/[\r]/g, "").trim());
            const jsonLinhas = JSON.stringify(linhasTratadas);

            const appCompilado = `<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Jogo Administract Completo</title>
    <style>
        body { background-color: #0d0d0d; color: #ffffff; font-family: Arial, sans-serif; padding: 40px; position: relative; overflow: hidden; min-height: 95vh; }
        button { font-weight: bold; border: none; display: block; margin-bottom: 8px; }
    </style>
</head>
<body>
    <div id="app-runtime" style="width: 100%; height: 100%; position: relative;"></div>
    <script>
        const linhas = ${jsonLinhas};
        const elementosCriados = {};
        let loopJogoAtivo = null;
        let colisoesAgendadas = {};
        const painel = document.getElementById('app-runtime');
        
        // Injeta funções nativas compiladas
        ${inicializarFisicaPlayer.toString()}
        (${rodarInterpretador.toString()})(linhas, painel);
    <\/script>
</body>
</html>`;

            const blob = new Blob([appCompilado], { type: "text/html;charset=utf-8" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "meujogo.administract.html";
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // --- RODAR NA IDE LOCAL ---
        function executarAdministract() {
            const painelResultado = document.getElementById('painel-resultado');
            const codigoTexto = document.getElementById('codigo').value;

            if (loopJogoAtivo) clearInterval(loopJogoAtivo);
            painelResultado.innerHTML = '';
            elementosCriados = {};
            colisoesAgendadas = {};

            const linhas = codigoTexto.split('\n').map(l => l.replace(/[\r]/g, "").trim());
            rodarInterpretador(linhas, painelResultado);
        }
    </script>
</body>
</html>

          } catch (err) {
            console.error('Runtime Error:', err);
            document.body.innerHTML += '<div style="color:red; background:#ffe6e6; padding:10px; margin-top:20px; border-radius:4px; border:1px solid red;"><strong>Runtime Error:</strong> ' + err.message + '</div>';
          }
        </script>
      </body>
    </html>
